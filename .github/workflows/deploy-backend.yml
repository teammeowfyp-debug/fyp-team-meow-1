# Build backend Docker image and push to Amazon ECR, then optionally roll ECS.
# - App Runner: enable "automatic deployment" on the ECR image tag.
# - ECS: set GitHub secrets ECS_CLUSTER + ECS_SERVICE so this workflow runs
#   `update-service --force-new-deployment` after each push (same :latest tag).

name: Deploy backend to ECR

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker build --platform linux/amd64 -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" backend
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Force new ECS deployment
        if: ${{ secrets.ECS_CLUSTER != '' && secrets.ECS_SERVICE != '' }}
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE }}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
